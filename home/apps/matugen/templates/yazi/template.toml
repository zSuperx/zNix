# vim:fileencoding=utf-8:foldmethod=marker
# Matugen Dynamic Theme for Yazi (Catppuccin-Mocha Based)

# : Manager 

[mgr]
cwd = { fg = "{{colors.tertiary.default.hex}}" }

# Find
find_keyword  = { fg = "{{colors.secondary.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.primary.default.hex}}", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

# Count
count_copied   = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.primary.default.hex}}" }
count_cut      = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

# Border
border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

# : 


# : Tabs 

[tabs]
active   = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}", bold = true }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

# : 


# : Mode 

[mode]

normal_main = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

# Select mode
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

# Unset mode
unset_main = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }
unset_alt  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

# : 


# : Status bar 

[status]
# Permissions
perm_sep   = { fg = "{{colors.outline.default.hex}}" }
perm_type  = { fg = "{{colors.primary.default.hex}}" }
perm_read  = { fg = "{{colors.secondary.default.hex}}" }
perm_write = { fg = "{{colors.error.default.hex}}" }
perm_exec  = { fg = "{{colors.tertiary.default.hex}}" }

# Progress
progress_label  = { fg = "{{colors.on_surface.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container_high.default.hex}}" }
progress_error  = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.error.default.hex}}" }

# : 


# : Pick 

[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.secondary.default.hex}}", bold = true }
inactive = {}

# : 


# : Input 

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }

# : 


# : Completion 

[cmp]
border = { fg = "{{colors.primary.default.hex}}" }

# : 


# : Tasks 

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = {}
hovered = { fg = "{{colors.tertiary.default.hex}}", bold = true }

# : 


# : Which 

[which]
mask            = { bg = "{{colors.surface_container.default.hex}}" }
cand            = { fg = "{{colors.tertiary.default.hex}}" }
rest            = { fg = "{{colors.on_surface_variant.default.hex}}" }
desc            = { fg = "{{colors.secondary.default.hex}}" }
separator       = "  "
separator_style = { fg = "{{colors.outline.default.hex}}" }

# : 


# : Help 

[help]
on      = { fg = "{{colors.tertiary.default.hex}}" }
run     = { fg = "{{colors.primary.default.hex}}" }
hovered = { reversed = true, bold = true }
footer  = { fg = "{{colors.surface_container.default.hex}}", bg = "{{colors.on_surface.default.hex}}" }

# : 


# : Spotter 

[spot]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
tbl_col  = { fg = "{{colors.tertiary.default.hex}}" }
tbl_cell = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_container_high.default.hex}}" }

# : 


# : Notification 

[notify]
title_info  = { fg = "{{colors.primary.default.hex}}" }
title_warn  = { fg = "{{colors.secondary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

# : 


# : File-specific styles 

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "{{colors.tertiary.default.hex}}" },
	# Media
	{ mime = "{audio,video}/*", fg = "{{colors.secondary.default.hex}}" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{colors.primary.default.hex}}" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "{{colors.on_surface.default.hex}}" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "{{colors.outline.default.hex}}" },
	# Fallback
	{ url = "*", fg = "{{colors.on_surface.default.hex}}" },
	{ url = "*/", fg = "{{colors.primary.default.hex}}" },
]

# : 

[icon]

dirs = [
	{ name = ".config", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = ".git", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = ".github", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = ".npm", text = "", fg = "{{colors.error.default.hex}}" },
	{ name = "Desktop", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Development", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = "Documents", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = "Downloads", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = "Library", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = "Movies", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ name = "Music", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ name = "Pictures", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ name = "Public", text = "", fg = "{{colors.primary.default.hex}}" },
	{ name = "Videos", text = "", fg = "{{colors.secondary.default.hex}}" },
]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "{{colors.on_surface_variant.default.hex}}" },
	{ if = "link", text = "", fg = "{{colors.outline.default.hex}}" },
	{ if = "block", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ if = "char", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ if = "fifo", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ if = "sock", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ if = "sticky", text = "", fg = "{{colors.secondary.default.hex}}" },
	{ if = "dummy", text = "", fg = "{{colors.error.default.hex}}" },

	# Fallback
	{ if = "dir & hovered", text = "", fg = "{{colors.primary.default.hex}}" },
	{ if = "dir", text = "", fg = "{{colors.primary.default.hex}}" },
	{ if = "exec", text = "", fg = "{{colors.tertiary.default.hex}}" },
	{ if = "!dir", text = "", fg = "{{colors.on_surface.default.hex}}" },
]
